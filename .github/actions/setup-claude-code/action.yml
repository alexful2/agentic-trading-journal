name: Setup Claude Code
description: >-
  Shared setup for the three LLM-driven workflows (daily-news-analyst,
  weekly-review, vault-curator). Sets up Python and Node, then installs
  the Claude Code CLI globally. The workflow itself must call
  actions/checkout before this action — local-path action references
  require the workspace to be populated first.

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.11"
  node-version:
    description: Node version to install
    required: false
    default: "20"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Claude Code
      shell: bash
      run: npm install -g @anthropic-ai/claude-code
